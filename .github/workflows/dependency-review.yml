name: Dependency Review

# Runs on every PR that changes a dependency manifest/lockfile and fails if
# the diff introduces a package with a known vulnerability (via GitHub's
# advisory database) or a disallowed license — the most direct check
# against "don't merge a newly-added malicious/vulnerable npm package."
on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
