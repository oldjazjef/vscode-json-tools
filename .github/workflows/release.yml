name: Release

# Triggered by pushing a tag like v0.1.0 (see the "Releasing" section in
# README.md). Runs the full test suite, packages a .vsix, attaches it to a
# new GitHub Release, and optionally publishes to the Visual Studio
# Marketplace / Open VSX if the corresponding secrets are configured.
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.22.3'
          cache: 'npm'

      - run: npm ci

      - name: Audit production dependencies (blocking)
        run: npm audit --omit=dev --audit-level=high

      - name: Verify npm package signatures
        run: npm audit signatures

      - run: npm run lint

      - run: npm run typecheck

      - run: npm run test:unit

      - name: Run integration tests (headless via xvfb)
        run: xvfb-run -a npm run test:integration

      - name: Update version in package.json from tag
        run: |
          TAG="${{ github.ref_name }}"
          VERSION=${TAG#v}  # Remove 'v' prefix
          node -e "const pkg = require('./package.json'); pkg.version = '$VERSION'; require('fs').writeFileSync('./package.json', JSON.stringify(pkg, null, 2) + '\n');"

      - name: Package extension
        run: npx vsce package --no-git-tag-version

      - name: Generate a CycloneDX SBOM for the release
        run: npx cyclonedx-npm --output-file sbom.cdx.json

      - name: Create GitHub Release with the .vsix and SBOM attached
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "${{ github.ref_name }}" --yes 2>/dev/null || true
          gh release create "${{ github.ref_name }}" ./*.vsix sbom.cdx.json --title "${{ github.ref_name }}" --generate-notes

      - name: Publish to Visual Studio Marketplace
        if: env.VSCE_PAT != ''
        run: npx vsce publish --no-git-tag-version --no-update-package-json --packagePath ./*.vsix

      - name: Publish to Open VSX
        if: env.OVSX_PAT != ''
        run: npx ovsx publish ./*.vsix -p "$OVSX_PAT"
