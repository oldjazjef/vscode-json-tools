name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # Actions are pinned to a commit SHA (not just a version tag) so a
      # compromised/re-tagged release upstream can't silently change what
      # runs in this pipeline. Dependabot (.github/dependabot.yml) opens a
      # PR to bump the pin — with the version in a trailing comment — when
      # a new release ships.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22.22.3'
          cache: 'npm'

      - run: npm ci

      # Fails the build on any high/critical advisory in the dependency
      # tree that actually ships inside the packaged extension (the
      # "dependencies" field — currently just jsonc-parser). Dev-only
      # tooling vulnerabilities (test runner, bundler, etc.) never reach
      # the .vsix, so they're reported but don't gate the build — see the
      # non-blocking step below.
      - name: Audit production dependencies (blocking)
        run: npm audit --omit=dev --audit-level=high

      # Verifies the npm registry's cryptographic signatures for every
      # installed package, catching tampering that a version-number-only
      # audit wouldn't notice.
      - name: Verify npm package signatures
        run: npm audit signatures

      - name: Audit full dependency tree (report only, does not fail the build)
        run: npm audit || true

      - run: npm run lint

      - run: npm run typecheck

      - run: npm run test:unit

      - name: Run integration tests (headless via xvfb)
        run: xvfb-run -a npm run test:integration
